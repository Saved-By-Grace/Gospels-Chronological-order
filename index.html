<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Static Webpage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
    }
    header {
      background-color: #0073e6;
      color: white;
      padding: 1rem 0;
    }
    main {
      padding: 2rem;
    }
    footer {
      margin-top: 2rem;
      background-color: #222;
      color: white;
      padding: 1rem 0;
    }
    a {
      color: #0073e6;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Static Webpage</h1>
    <p>Hosted on GitHub Pages</p>
  </header>
  <main>
    <h2>About This Page</h2>
    <p>This is a simple static webpage example.</p>
    <p>You can customize this template to create your own awesome site!</p>
    <a href="https://github.com" target="_blank">Learn more about GitHub Pages</a>
  </main>
  <footer>
    <p>&copy; 2024 Your Name</p>
  </footer>
</body>
</html>
